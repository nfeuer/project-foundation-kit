# Project profile — the single source of truth the kit's skills and hooks read.
# Bootstrap detects most of this from the repo; edit anything it got wrong.
# Skills reference these keys by dotted path (e.g. `toolchain.test`). A skill
# step tagged `# kit.yaml → toolchain.test` means: run the command from this
# file if set, else the literal default shown in the skill.
#
# Capability toggles gate whole skills: when `capabilities.migrations.enabled`
# is false, the migration-check step is skipped and reported N/A. This is how one
# kit serves a Python LLM service and a Go CLI without editing every skill.

kit_version: "2.0.0-alpha"  # stamp; `kit-update` compares this against the source kit
preset: "llm-app"           # library | service | llm-app | frontend | data-pipeline | custom

# --- Gates: how strictly the quality gates enforce (scale-adaptive) ---
# prototype  → ratchet/perf/eval gates REPORT but never block; hard-safety gates
#              (secrets, migrations, security review) still block. For repos
#              that don't yet have users or a baseline worth defending.
# standard   → the documented default behavior of every gate.
# production → warnings harden: sparse perf data and missing baselines block
#              instead of warn; security review runs on every diff.
gates:
  strictness: "standard"    # prototype | standard | production
  # modes = enforce | suggest | off; suggest surfaces the gate and records declines;
  # a gate with an authoritative CI job may not be demoted below enforce (SPEC.md §2.3, §4.1).
  modes:                    # fully written by init; edit any line to override (SPEC.md §4.4)
    secrets_scan: enforce
    credential_files: enforce
    worktree_isolation: enforce
    lint_types_tests: enforce
    integration_tests: enforce
    migration_check: enforce
    coverage_ratchet: enforce
    perf_budget: enforce
    security_review: suggest
    test_gap: suggest
    docs_sync: suggest
    spec_drift: suggest
    prompt_regression: enforce
    branch_conflict: enforce
    observability_check: suggest
    flaky_triage: enforce
    sync_health: enforce
    ui_build: enforce
    build_artifact: enforce
    capture: enforce
  # triggers are read by the agent, not by hooks/kit-config, so flow-style lists are
  # fine here even though §10.3 constrains the bash-read keys (modes, above).
  triggers:                 # path globs per gate, matched against the branch diff (SPEC.md §6.1)
    security_review: [".claude/hooks/**", ".claude/settings*", "scripts/**", ".github/workflows/**"]
    docs_sync: [".claude/skills/**", ".claude/agents/**", "README.md", "docs/**"]
    spec_drift: [".claude/**", "scripts/**", "templates/**"]
    test_gap: ["scripts/**", ".claude/hooks/**"]
  # unattended:             # per-gate pre-consent for non-interactive runs (SPEC.md §6.4)
  #   security_review: run  # run | skip — unattended sessions skip-and-log suggest gates by default

# --- Git / concurrency ---
trunk_branch: "main"        # branch the worktree-isolation hook protects
worktree_dir: ".claude/worktrees"

# --- Toolchain: the commands every gate runs. Empty string ("") = skip the step.
toolchain:
  lint:             "uv run ruff check src/ tests/"
  format:           "ruff format"
  typecheck:        "uv run mypy src/"
  test:             "uv run pytest tests/unit/ -m 'not slow and not llm' --tb=short -q"
  test_integration: "uv run pytest tests/integration/ -m 'not slow and not llm' -q"
  build:            ""      # e.g. "uv build" or a frontend build; empty → no build gate
  install:          "uv sync --dev"

# --- Capabilities: toggles that enable/disable capability-specific skills ---
capabilities:
  migrations:
    enabled: true
    heads_cmd: "uv run alembic heads"     # must report exactly one head
    versions_glob: "*/versions/*.py"      # where migration-check greps for destructive ops
  ui:
    enabled: false
    build_cmd: ""
    typecheck_cmd: ""
  llm:
    enabled: true            # gates eval-harness, prompt-regression, cost-check
    eval_dir: "fixtures"
    spend_table: "invocation_log"
  spec:
    file: "SPEC.md"          # "" → disable spec-drift / citation checks
    section_marker: "§"
  docs:
    enabled: true
    dir: "docs"
  coverage:
    ratchet_enabled: true    # block PRs that drop coverage below the baseline
    baseline_file: ".coverage-baseline"
  perf:
    enabled: false           # gates the perf-budget PR gate; on for traffic-bearing services
    source: "log"            # "log" (read latency_ms from spend_table) | "benchmark" (run benchmark_cmd)
    benchmark_cmd: ""        # command that emits per-operation latencies as JSON (source: benchmark)
    baseline_file: ".perf-baseline"
    tolerance_pct: 10        # allowed p95 regression before the gate fails
    budgets: {}              # map of operation-name → p95_ms budget, e.g. {llm_call: 4000}
  replica:
    enabled: false           # gates sync-health; on when a primary + replica exist
    primary: ""              # connection ref / path to the primary datastore
    replica: ""              # connection ref to the replica
    tables: []               # key tables to check for lag + row-count parity
    lag_threshold_s: 300     # replication lag (seconds) that trips an alert
    parity_tolerance: 0      # allowed row-count delta before it's a gap

# --- Logging: what the logging-init skill probed, asked, and wired ---
logging:
  initialized: true          # false → logging-init hasn't run; kit-doctor warns
  library: "structlog"       # detected/chosen logging library ("" until initialized)
  destination: "stdout"      # stdout | file | loki | datadog | cloudwatch | other
  dev_console: true          # human-readable console renderer locally, JSON in prod

# --- Alerts: where nightly-audit / incident-capture / fallback alerts post ---
alerts:
  channel: "discord"         # discord | slack | none
  target: "#project-debug"   # channel name or webhook env var

# --- Budget: spend thresholds cost-check reads (not a hardcoded config path) ---
budget:
  daily_usd: 20              # daily pause threshold
  monthly_usd: 100           # monthly hard cap
  spend_db_path: ""          # path to the DB holding capabilities.llm.spend_table; "" → discover from repo root

# --- Release automation (release skill) ---
release:
  changelog_file: "docs/changelog.md"
  auto_tag: true             # tag + draft GitHub release after changelog review; false → stop at the changelog diff + proposed version
  require_spec_citations: true   # warn on release-worthy commits with no § citation

# --- Flaky-test triage (flaky-triage skill) ---
flaky:
  rerun_count: 5             # times to re-run a suspect test to confirm flakiness
  flaky_threshold: 0.8       # pass-rate below this (and >0) = flaky, not a real failure
  marker: "flaky"            # test marker used to quarantine (excluded from the gating run)
  quarantine_allowed: true   # false → flaky is a hard stop, no quarantine loan
  registry: "docs/flaky-tests.md"
