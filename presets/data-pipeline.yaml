# Data-pipeline archetype — ETL, batch jobs, model training, or feature-engineering
# pipelines. Migrations on (schema evolves with data contracts). Operational skills
# active: nightly-audit, healthwatch. LLM optional — off by default; flip enabled
# to true if the pipeline calls an LLM for labelling, summarisation, etc.

preset: "data-pipeline"

gates:
  strictness: "standard"    # raise to "production" once downstream consumers rely on the data
  # init writes the uncommented block per gates.strictness + this preset's overlays
  # (SPEC.md §4.3–4.4); uncomment/edit to override. data-pipeline overlay: team-shaped
  # preset, worktree_isolation defaults to enforce (§4.3).
  # modes:
  #   secrets_scan: enforce
  #   credential_files: enforce
  #   worktree_isolation: enforce
  #   lint_types_tests: enforce
  #   integration_tests: enforce
  #   migration_check: enforce
  #   coverage_ratchet: enforce
  #   perf_budget: enforce
  #   security_review: suggest
  #   test_gap: suggest
  #   docs_sync: suggest
  #   spec_drift: suggest
  #   prompt_regression: suggest
  #   branch_conflict: enforce
  #   observability_check: suggest
  #   flaky_triage: enforce
  #   sync_health: enforce
  #   ui_build: enforce
  #   build_artifact: enforce
  #   capture: enforce
  # triggers:
  #   sync_health: ["**/etl/**", "**/pipelines/**"]
  #   migration_check: ["**/versions/**"]

toolchain:
  lint:             "uv run ruff check src/ tests/"
  format:           "ruff format"
  typecheck:        "uv run mypy src/"
  test:             "uv run pytest tests/unit/ -m 'not slow' --tb=short -q"
  test_integration: "uv run pytest tests/integration/ -m 'not slow' -q"
  build:            ""
  install:          "uv sync --dev"

capabilities:
  migrations:
    enabled: true
    heads_cmd: "uv run alembic heads"
    versions_glob: "*/versions/*.py"
  ui:
    enabled: false
    build_cmd: ""
    typecheck_cmd: ""
  llm:
    enabled: false                     # flip to true + set eval_dir/spend_table if adding LLM
    eval_dir: "fixtures"
    spend_table: "invocation_log"
  spec:
    file: ""                           # set to your pipeline spec file if you have one
    section_marker: "§"
  docs:
    enabled: true
    dir: "docs"
  coverage:
    ratchet_enabled: true
    baseline_file: ".coverage-baseline"

logging:
  initialized: false                   # run logging-init: probe → 3 questions → wire
  library: ""
  destination: "stdout"
  dev_console: true

alerts:
  channel: "discord"                   # discord | slack | none
  target: "#data-alerts"
