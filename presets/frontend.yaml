# Frontend archetype — browser or mobile UI (React, Vue, Svelte, etc.).
# npm/pnpm toolchain. Build + typecheck gates on. No migrations, no LLM.
# Substitute pnpm/yarn commands if that's your package manager.
# Alerts optional — flip channel to discord/slack once you have a webhook.

preset: "frontend"

gates:
  strictness: "standard"    # prototype | standard | production — see docs/PROFILE.md
  # init writes the uncommented block per gates.strictness + this preset's overlays
  # (SPEC.md §4.3–4.4); uncomment/edit to override. frontend overlay: team-shaped preset,
  # worktree_isolation defaults to enforce (§4.3); ui_build: enforce matters most here
  # (this is the archetype's build gate).
  # modes:
  #   secrets_scan: enforce
  #   credential_files: enforce
  #   worktree_isolation: enforce
  #   lint_types_tests: enforce
  #   integration_tests: enforce
  #   migration_check: enforce
  #   coverage_ratchet: enforce
  #   perf_budget: enforce
  #   security_review: suggest
  #   test_gap: suggest
  #   docs_sync: suggest
  #   spec_drift: suggest
  #   prompt_regression: suggest
  #   branch_conflict: enforce
  #   observability_check: suggest
  #   flaky_triage: enforce
  #   sync_health: enforce
  #   ui_build: enforce
  #   build_artifact: enforce
  #   capture: enforce
  # triggers:
  #   ui_build: ["src/**", "package.json"]
  #   docs_sync: ["src/components/**"]

toolchain:
  lint:             "npm run lint"      # swap for: pnpm lint | yarn lint
  format:           "npm run format"
  typecheck:        "npm run typecheck" # typically: tsc --noEmit (via npm script)
  test:             "npm test -- --run" # Vitest/Jest one-shot (no watch mode)
  test_integration: ""
  build:            "npm run build"     # must exit 0 for the gate to pass
  install:          "npm install"       # swap for: pnpm install | yarn

capabilities:
  migrations:
    enabled: false
    heads_cmd: ""
    versions_glob: ""
  ui:
    enabled: true
    build_cmd:      "npm run build"
    typecheck_cmd:  "npm run typecheck"
  llm:
    enabled: false
    eval_dir: ""
    spend_table: ""
  spec:
    file: ""                            # set to your design spec file if you have one
    section_marker: "§"
  docs:
    enabled: true
    dir: "docs"
  coverage:
    ratchet_enabled: true
    baseline_file: ".coverage-baseline"

logging:
  initialized: false                    # run logging-init — browser posture: console in dev, structure via the error/telemetry reporter
  library: ""
  destination: "other"
  dev_console: true

alerts:
  channel: "none"                       # switch to discord/slack once wired
  target: ""
