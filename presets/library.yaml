# Library archetype — reusable package published to a registry (PyPI, npm, crates.io, etc.).
# No deployment, no migrations, no UI, no LLM. Gate focus: code quality, coverage,
# dep-audit, doc-sync, secret-scan, config-consistency, and follow-up tracking.
# Alerts are off; nothing to page about at library publish time.

preset: "library"

gates:
  strictness: "standard"    # prototype | standard | production — see docs/PROFILE.md
  # init writes the uncommented block per gates.strictness + this preset's overlays
  # (SPEC.md §4.3–4.4); uncomment/edit to override. library overlay: solo-shaped preset,
  # worktree_isolation defaults to suggest (§4.3).
  # modes:
  #   secrets_scan: enforce
  #   credential_files: enforce
  #   worktree_isolation: suggest
  #   lint_types_tests: enforce
  #   integration_tests: enforce
  #   migration_check: enforce
  #   coverage_ratchet: enforce
  #   perf_budget: enforce
  #   security_review: suggest
  #   test_gap: suggest
  #   docs_sync: suggest
  #   spec_drift: suggest
  #   prompt_regression: suggest
  #   branch_conflict: enforce
  #   observability_check: suggest
  #   flaky_triage: enforce
  #   sync_health: enforce
  #   ui_build: enforce
  #   build_artifact: enforce
  #   capture: enforce
  # triggers:
  #   docs_sync: ["src/**", "README.md"]
  #   test_gap: ["src/**"]

toolchain:
  lint:             "uv run ruff check src/ tests/"
  format:           "ruff format"
  typecheck:        "uv run mypy src/"
  test:             "uv run pytest tests/ -m 'not slow' --tb=short -q"
  test_integration: ""                  # no integration surface; flip on if needed
  build:            "uv build"          # produce the sdist/wheel
  install:          "uv sync --dev"

capabilities:
  migrations:
    enabled: false
    heads_cmd: ""
    versions_glob: ""
  ui:
    enabled: false
    build_cmd: ""
    typecheck_cmd: ""
  llm:
    enabled: false
    eval_dir: ""
    spend_table: ""
  spec:
    file: ""                            # no canonical spec; set to "SPEC.md" if you add one
    section_marker: "§"
  docs:
    enabled: true
    dir: "docs"
  coverage:
    ratchet_enabled: true
    baseline_file: ".coverage-baseline"

logging:
  initialized: false        # run logging-init: probe → 3 questions → wire
  library: ""
  destination: "stdout"
  dev_console: true

alerts:
  channel: "none"
  target: ""
