# LLM-app archetype — service that makes LLM API calls as a core capability.
# Everything on: eval harness, prompt-regression, cost-check, migrations, alerts.
# This mirrors the default kit.yaml distributed with the kit.
# Update spend_table to match your invocation-log table name if different.

preset: "llm-app"

gates:
  strictness: "standard"    # raise to "production" once real users depend on it

toolchain:
  lint:             "uv run ruff check src/ tests/"
  format:           "ruff format"
  typecheck:        "uv run mypy src/"
  test:             "uv run pytest tests/unit/ -m 'not slow and not llm' --tb=short -q"
  test_integration: "uv run pytest tests/integration/ -m 'not slow and not llm' -q"
  build:            ""
  install:          "uv sync --dev"

capabilities:
  migrations:
    enabled: true
    heads_cmd: "uv run alembic heads"
    versions_glob: "*/versions/*.py"
  ui:
    enabled: false
    build_cmd: ""
    typecheck_cmd: ""
  llm:
    enabled: true
    eval_dir: "fixtures"               # tiered eval fixtures live here
    spend_table: "invocation_log"      # table the cost-check skill queries
  spec:
    file: "spec.md"                    # rename to match your canonical spec file
    section_marker: "§"
  docs:
    enabled: true
    dir: "docs"
  coverage:
    ratchet_enabled: true
    baseline_file: ".coverage-baseline"

alerts:
  channel: "discord"                   # discord | slack | none
  target: "#project-debug"
