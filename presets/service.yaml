# Service archetype — deployed backend service (API, daemon, worker).
# Migrations on. Operational skills active: nightly-audit, incident-capture,
# healthwatch. No LLM capabilities. Alerts wired to a channel — change
# target to your actual Discord/Slack channel or webhook env var.

preset: "service"

gates:
  strictness: "standard"    # raise to "production" once the service carries real traffic

toolchain:
  lint:             "uv run ruff check src/ tests/"
  format:           "ruff format"
  typecheck:        "uv run mypy src/"
  test:             "uv run pytest tests/unit/ -m 'not slow' --tb=short -q"
  test_integration: "uv run pytest tests/integration/ -m 'not slow' -q"
  build:            ""                  # Docker build is usually in CI, not a local gate
  install:          "uv sync --dev"

capabilities:
  migrations:
    enabled: true
    heads_cmd: "uv run alembic heads"   # must report exactly one head
    versions_glob: "*/versions/*.py"
  ui:
    enabled: false
    build_cmd: ""
    typecheck_cmd: ""
  llm:
    enabled: false                      # flip to true and set eval_dir if you add LLM calls
    eval_dir: ""
    spend_table: ""
  spec:
    file: ""                            # set to your canonical spec file if you have one
    section_marker: "§"
  docs:
    enabled: true
    dir: "docs"
  coverage:
    ratchet_enabled: true
    baseline_file: ".coverage-baseline"
  perf:
    enabled: true                       # traffic-bearing → guard p95 regressions
    source: "log"
    baseline_file: ".perf-baseline"
    tolerance_pct: 10
    budgets: {}                         # fill with {operation: p95_ms} for hot paths
  replica:
    enabled: false                      # flip on if you run a primary + replica; set tables
    primary: ""
    replica: ""
    tables: []
    lag_threshold_s: 300
    parity_tolerance: 0

alerts:
  channel: "discord"                    # discord | slack | none
  target: "#ops-alerts"                 # channel name or webhook env var
